apiVersion: v1
kind: Pod

metadata:
  name: oom-demo

spec:
  containers:
  - name: memory-hog
    image: polinux/stress

    resources:
      requests:
        memory: "50Mi"

      limits:
        memory: "100Mi"

    command:
    - stress

    args:
    - "--vm"
    - "1"
    - "--vm-bytes"
    - "200M"
    - "--vm-hang"
    - "1"
