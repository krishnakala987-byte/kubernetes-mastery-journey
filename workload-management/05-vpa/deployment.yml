apiVersion: apps/v1
kind: Deployment

metadata:
  name: vpa-demo

spec:
  replicas: 1
    
  selector:
    matchLabels:
      app: vpa-demo


  template:
    metadata:
      labels:
        app: vpa-demo

    spec:
      containers:
      - name: nginx
        image: nginx

        resources:
          requests:
            cpu: 100m
            memory: 128Mi


          limits:
            cpu: 500m
            memory: 256Mi
