apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: payment

  template:
    metadata:
      labels:
        app: payment

    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - payment

            topologyKey: kubernetes.io/hostname

      containers:
      - name: nginx
        image: nginx
