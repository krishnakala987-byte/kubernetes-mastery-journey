apiVersion: v1
kind: Pod

metadata:
  name: affinity-demo

spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: env
            operator: In
            values:
            - prod
            - dev

  containers:
  - name: nginx
    image: nginx
