apiVersion: apps/v1
kind: Deployment

metadata:
  name: configmap-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: configmap-demo
        
  template:
    metadata:
      labels:
        app: configmap-demo

    spec:
      containers:
      - name: app
        image: nginx
   
        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_NAME

        - name: ENVIRONMENT
          valueFrom:
           configMapKeyRef:
             name: app-config
             key: ENVIRONMENT
