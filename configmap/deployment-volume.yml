apiVersion: apps/v1
kind: Deployment

metadata:
  name: configmap-volume-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: configmap-volume-demo

  template:
    metadata:
      labels:
        app: configmap-volume-demo

    spec:
      containers:
      - name: nginx
        image: nginx

        volumeMounts:
        - name: config-volume
          mountPath: /config

      volumes:
      - name: config-volume
        configMap:
          name: file-config
