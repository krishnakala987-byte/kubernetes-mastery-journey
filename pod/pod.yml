apiVersion: v1
kind: Pod

metadata:
  name: nginx-pod
  namespace: nginx

spec:
  containers:
  - name: nginx
    image: nginx:latest

    ports:
    - containerPort: 80

    volumeMounts:
    - name: web-storage
      mountPath: /usr/share/nginx/html

  volumes:
  - name: web-storage
    persistentVolumeClaim:
      claimName: local-pvc
