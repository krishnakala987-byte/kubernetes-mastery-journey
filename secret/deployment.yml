apiVersion: apps/v1
kind: Deployment

metadata:
  name: secret-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: secret-demo

  template:
    metadata:
      labels:
        app: secret-demo

    spec:
      containers:
      - name: nginx
        image: nginx

        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD 
