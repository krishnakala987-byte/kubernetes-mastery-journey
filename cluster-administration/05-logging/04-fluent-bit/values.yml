config:
  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name es
        Match *
        Host elasticsearch-master
        Port 9200
        HTTP_User elastic
        HTTP_Passwd EaLlzUpwDkqD3dSB
        TLS On
        TLS.Verify Off
        Logstash_Format On
        Logstash_Prefix logstash
        Suppress_Type_Name On
        Replace_Dots On
