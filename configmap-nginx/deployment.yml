apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-configmap-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
      - name: nginx
        image: nginx

        ports:
        - containerPort: 80

        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html


      volumes:
      - name: html-volume
        configMap:
          name: nginx-html
